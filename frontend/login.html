<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="login.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: transparent; }
        .login-wrapper {
            display: flex; justify-content: center; align-items: center; min-height: 80vh;
        }
        .login-box {
            background: linear-gradient(165deg, rgba(13, 27, 42, 0.92) 0%, rgba(10, 15, 26, 0.95) 50%, rgba(5, 5, 15, 0.98) 100%);
            backdrop-filter: blur(24px) saturate(1.2);
            border: 2px solid rgba(217, 30, 91, 0.35);
            border-radius: 36px;
            padding: 3rem 2.5rem;
            text-align: center;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.5s ease;
        }

        .login-box::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 36px;
            box-shadow: 0 0 0 rgba(217, 30, 91, 0);
            z-index: -1;
            transition: box-shadow 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-box:hover {
            transform: scale(1.04) translateY(-6px);
            border-color: rgba(255, 107, 157, 0.8);
        }

        .login-box:hover::before {
            box-shadow: 
                -15px -15px 30px rgba(255, 107, 157, 0.4),
                15px -15px 30px rgba(255, 107, 157, 0.4),
                -15px 15px 30px rgba(255, 107, 157, 0.4),
                15px 15px 30px rgba(255, 107, 157, 0.4);
        }
        
        h1 { margin:0; letter-spacing:-2px; font-weight:800; font-size:2.8rem; line-height:1.1; color: white; }
        .gradient-text { background: linear-gradient(135deg, #D91E5B, #FF6B9D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo-icon { font-size: 2.5rem; filter: drop-shadow(0 0 12px rgba(217,30,91,0.4)); display: block; margin-bottom: 0.5rem; }
        .divider { width:50px; height:3px; background: linear-gradient(90deg, #D91E5B, #FF6B9D); margin: 0.8rem auto; border-radius: 3px; }
        .subtitle { margin-bottom:1.5rem; opacity:0.4; font-size:0.7rem; letter-spacing:3px; text-transform:uppercase; color: white; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <span class="logo-icon">🤖</span>
            <h1>KPMG <span class="gradient-text">AI</span></h1>
            <div class="divider"></div>
            <p class="subtitle">Secure Access Portal</p>
        </div>
    </div>
</body>
</html>
